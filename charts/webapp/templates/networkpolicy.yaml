apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: webapp-isolation
spec:
  podSelector:
    matchLabels:
      app: webapp

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              tenant: "{{ .Release.Namespace }}"
      ports:
        - protocol: TCP
          port: 3000

  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
