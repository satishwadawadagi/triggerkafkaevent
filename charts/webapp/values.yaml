replicaCount: 2

image:
  repository: docker.io/satishwadawadagi/mutitenantwebapp
  tag: latest

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

ingress:
  enabled: true
  className: nginx
  host: example.com
  tlsSecret: webapp-tls

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuUtilization: 70
